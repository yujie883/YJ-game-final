  <!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE HOUSE 特調解碼遊戲</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="grain"></div>

    <div class="main-container">
      <header>
        <div class="live-house-logo">
          <span class="neon-text-blue">YJ</span> 
          <span class="neon-text-pink">GAME</span> 
          <span class="sub-logo">BASEMENT</span>
        </div>
        <h1><span class="highlight">密碼</span>解鎖遊戲</h1>
        <p class="instruction">解開密碼，贏得當晚限量隱藏版特調</p>
      </header>

      <main>
        <section class="game-box">
          <div class="game-info">
            <p>請輸入一個 <span class="neon-text-blue">1</span> 至 <span class="neon-text-pink">100</span> 之間的數字</p>
          </div>

          <div class="input-group">
            <input type="text" id="guessInput" placeholder="❓" inputmode="numeric">
            <button id="guessButton">解碼</button>
          </div>

          <div id="message">遊戲開始...</div>
        </section>
      </main>

      <footer>
        <p>&copy; YJ餘溫迴響 Resonance & Warmth. 網頁設計期末作業</p>
      </footer>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
